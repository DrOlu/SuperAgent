npmRebuild: false
appId: ng.hyperspace.superagent
productName: SuperAgent
executableName: SuperAgent
afterPack: ./scripts/after-pack.js
afterSign: ./scripts/after-sign.js
directories:
  output: release
files:
  - dist/**/*
asarUnpack:
  - dist/daemon/node-entrypoint-runner.js
  - node_modules/@getpaseo/server/dist/server/terminal/shell-integration/**/*
extraResources:
  - from: ../app/dist
    to: app-dist
  - from: ../../skills
    to: skills
publish:
  provider: github
  owner: DrOlu
  repo: SuperAgent
mac:
  artifactName: "SuperAgent-${version}-${arch}.${ext}"
  category: public.app-category.developer-tools
  icon: assets/icon.icns
  hardenedRuntime: false
  notarize: false
  identity: null
  extraResources:
    - from: bin/paseo
      to: bin/paseo
  target:
    - dmg
    - zip
linux:
  category: Development
  icon: assets
  artifactName: "SuperAgent-${version}-${arch}.${ext}"
  maintainer: "Hyperspace Technologies <superagent@hyperspace.ng>"
  vendor: "SuperAgent by Hyperspace Technologies"
  extraResources:
    - from: bin/paseo
      to: bin/paseo
  target:
    - AppImage
    - deb
    - rpm
    - tar.gz
win:
  icon: assets/icon.ico
  extraResources:
    - from: bin/paseo.cmd
      to: bin/paseo.cmd
  target:
    - nsis
    - zip
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
