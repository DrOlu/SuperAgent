name: Sync Upstream & Release

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:
    inputs:
      force:
        description: 'Force sync even if no new upstream commits'
        required: false
        default: 'false'

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout SuperAgent (main)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Fetch upstream paseo
        run: |
          git remote add upstream https://github.com/getpaseo/paseo.git || true
          # Full-history fetch: shallow fetches break the subsequent force-push
          # with "did not receive expected object" because pushed commits
          # reference upstream parent objects the server expects us to have.
          git fetch upstream main
          UPSTREAM_SHA=$(git rev-parse upstream/main)
          echo "UPSTREAM_SHA=$UPSTREAM_SHA" >> $GITHUB_ENV
          echo "Upstream SHA: $UPSTREAM_SHA"

      - name: Check for new upstream commits
        id: check
        run: |
          # Accept both short (7-40 hex) and full SHAs in the commit marker; compare by prefix.
          LAST_SYNC=$(git log --format=%B main | grep -oE 'upstream-sync: [a-f0-9]{7,40}' | head -1 | awk '{print $2}' || echo "")
          echo "Last synced SHA: '$LAST_SYNC'"
          echo "Upstream SHA:    '$UPSTREAM_SHA'"
          FORCE="${{ github.event.inputs.force }}"
          if [ "$FORCE" = "true" ]; then
            echo "Force flag set - will sync"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          elif [ -z "$LAST_SYNC" ]; then
            echo "No previous sync marker found - will sync"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            UPSTREAM_PREFIX="${UPSTREAM_SHA:0:${#LAST_SYNC}}"
            if [ "$LAST_SYNC" = "$UPSTREAM_PREFIX" ]; then
              echo "Already up to date with upstream"
              echo "has_changes=false" >> $GITHUB_OUTPUT
            else
              echo "New upstream commits detected"
              echo "has_changes=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Apply SuperAgent rebrand to upstream
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "Hyperspace Technologies"
          git config user.email "superagent@hyperspace.ng"

          # Reset working tree to upstream (clean slate)
          git checkout -B sync-work upstream/main

          # Restore our branding assets and workflows
          git checkout main -- branding/ .github/workflows/sync-upstream.yml 2>/dev/null || true
          git checkout main -- packages/desktop/src/integrations/tools-manager.ts 2>/dev/null || true

          # Apply all branding changes via inline script
          node -e "
          const fs = require('fs');
          const path = require('path');

          function replaceIn(filePath, replacements) {
            if (!fs.existsSync(filePath)) return;
            let c = fs.readFileSync(filePath, 'utf8');
            const orig = c;
            for (const [o, n] of replacements) c = c.split(o).join(n);
            if (c !== orig) fs.writeFileSync(filePath, c);
          }

          // app.config.js - visible name only
          replaceIn('packages/app/app.config.js', [
            ['name: \"Paseo\"', 'name: \"SuperAgent\"'],
            ['name: \"Paseo Debug\"', 'name: \"SuperAgent Debug\"'],
          ]);

          // Welcome / splash text
          replaceIn('packages/app/src/components/welcome-screen.tsx', [
            ['Welcome to Paseo', 'Welcome to SuperAgent'],
          ]);
          replaceIn('packages/app/src/screens/startup-splash-screen.tsx', [
            ['Welcome to Paseo', 'Welcome to SuperAgent'],
            ['https://github.com/getpaseo/paseo/issues/new', 'https://github.com/DrOlu/SuperAgent/issues/new'],
          ]);

          // Settings strings
          replaceIn('packages/app/src/screens/settings-screen.tsx', [
            ['\"This updates Paseo on this computer.\"', '\"This updates SuperAgent on this computer.\"'],
            ['\"This host is offline. Paseo reconnects', '\"This host is offline. SuperAgent reconnects'],
            ['\"Failed to send the restart request. Paseo', '\"Failed to send the restart request. SuperAgent'],
          ]);
          replaceIn('packages/app/src/desktop/components/desktop-updates-section.tsx', [
            ['\"Enabled. Paseo can manage', '\"Enabled. SuperAgent can manage'],
            ['title=\"Add paseo to your shell\"', 'title=\"Add SuperAgent to your shell\"'],
            ['Paseo does not add the command for you.', 'SuperAgent does not add the command for you.'],
            ['Scan this QR code in Paseo,', 'Scan this QR code in SuperAgent,'],
            ['https://paseo.sh/docs/configuration', 'https://hyperspace.ng/docs/configuration'],
          ]);
          replaceIn('packages/app/src/desktop/permissions/use-desktop-permissions.ts', [
            ['title: \"Paseo notification test\"', 'title: \"SuperAgent notification test\"'],
          ]);
          replaceIn('packages/app/src/desktop/updates/update-banner.tsx', [
            ['\"https://paseo.sh/changelog\"', '\"https://github.com/DrOlu/SuperAgent/releases\"'],
          ]);
          replaceIn('packages/app/src/components/agent-form/agent-form-dropdowns.tsx', [
            ['\"Pick a Paseo worktree by branch\"', '\"Pick a SuperAgent worktree by branch\"'],
          ]);

          // Desktop main
          replaceIn('packages/desktop/src/main.ts', [
            ['app.setName(\"Paseo\");', 'app.setName(\"SuperAgent\");'],
          ]);

          // daemon-manager: visible strings + update check fix
          replaceIn('packages/desktop/src/daemon/daemon-manager.ts', [
            ['\"Create a symlink to the bundled Paseo CLI shim.\"', '\"Create a symlink to the bundled SuperAgent CLI shim.\"'],
            ['\"Add the Paseo installation directory', '\"Add the SuperAgent installation directory'],
            ['check_app_update: async () => {\n      const currentVersion = await resolveCurrentUpdateVersion();\n      return checkForAppUpdate(currentVersion);',
             'check_app_update: async () => {\n      const currentVersion = resolveDesktopAppVersion();\n      return checkForAppUpdate(currentVersion);'],
          ]);

          // auto-updater: version normalisation (written verbatim to avoid
          // type-annotation loss via inline node -e quoting layers)
          {
            const p = 'packages/desktop/src/features/auto-updater.ts';
            if (fs.existsSync(p)) {
              let s = fs.readFileSync(p, 'utf8');
              const needle = '    const hasUpdate = latestVersion !== currentVersion;';
              const replacement =
                '    const nv = (v' + ': string) => v.replace(/^v/i, \"\").trim();\n' +
                '    const hasUpdate = nv(latestVersion) !== nv(currentVersion);';
              if (s.includes(needle)) {
                s = s.replace(needle, replacement);
                fs.writeFileSync(p, s);
              } else if (s.includes('const nv = (v)')) {
                // Patch already applied but lost its type annotation in a prior sync
                s = s.replace('const nv = (v)', 'const nv = (v' + ': string)');
                fs.writeFileSync(p, s);
              }
            }
          }

          // after-pack.js: executable name
          replaceIn('packages/desktop/scripts/after-pack.js', [
            ['const EXECUTABLE_NAME = \"Paseo\";', 'const EXECUTABLE_NAME = \"SuperAgent\";'],
          ]);

          // smoke-packaged-desktop-app.js (added in upstream v0.1.64): executable name
          replaceIn('packages/desktop/scripts/smoke-packaged-desktop-app.js', [
            ['const EXECUTABLE_NAME = \"Paseo\";', 'const EXECUTABLE_NAME = \"SuperAgent\";'],
            ['node smoke-packaged-desktop-app.js --app <Paseo.app>', 'node smoke-packaged-desktop-app.js --app <SuperAgent.app>'],
          ]);

          // after-sign.js (added in upstream v0.1.64): macOS .app name used by smoke
          replaceIn('packages/desktop/scripts/after-sign.js', [
            ['const EXECUTABLE_NAME = \"Paseo\";', 'const EXECUTABLE_NAME = \"SuperAgent\";'],
          ]);

          // Release notes sync title: Paseo -> SuperAgent
          replaceIn('scripts/sync-release-notes-from-changelog.mjs', [
            ['\`Paseo \${targetTag}\`', '\`SuperAgent \${targetTag}\`'],
          ]);

          // desktop-release.yml: release title Paseo -> SuperAgent
          replaceIn('.github/workflows/desktop-release.yml', [
            ['--title \"Paseo \$RELEASE_TAG\"', '--title \"SuperAgent \$RELEASE_TAG\"'],
          ]);

          // bin shims - rewrite via direct file read/write to avoid bash \$ quoting traps
          {
            const p = 'packages/desktop/bin/paseo';
            if (fs.existsSync(p)) {
              let s = fs.readFileSync(p, 'utf8');
              // Order matters: more-specific patterns first so '/Paseo' replacement
              // doesn't greedily eat into '/Paseo.bin' or 'MacOS/Paseo'.
              s = s.split('MacOS/Paseo').join('MacOS/SuperAgent');
              s = s.split('Paseo.bin').join('SuperAgent.bin');
              s = s.split('/../Paseo' + String.fromCharCode(34)).join('/../SuperAgent' + String.fromCharCode(34));
              s = s.split('Bundled Paseo executable').join('Bundled SuperAgent executable');
              fs.writeFileSync(p, s);
            }
          }
          replaceIn('packages/desktop/bin/paseo.cmd', [
            ['Paseo.exe', 'SuperAgent.exe'],
            ['Paseo.bin', 'SuperAgent.bin'],
            ['Bundled Paseo', 'Bundled SuperAgent'],
          ]);

          // Fix emit-release-env.mjs: add RELEASE_CHANNEL (upstream bug — referenced but never emitted)
          {
            const p = 'scripts/emit-release-env.mjs';
            if (fs.existsSync(p)) {
              let s = fs.readFileSync(p, 'utf8');
              if (!s.includes('RELEASE_CHANNEL')) {
                s = s.replace(
                  '[\"RELEASE_TYPE\", info.releaseType],',
                  '[\"RELEASE_TYPE\", info.releaseType],\n  [\"RELEASE_CHANNEL\", info.isPrerelease ? \"beta\" : \"latest\"],'
                );
                fs.writeFileSync(p, s);
              }
            }
          }

          // electron-builder.yml
          replaceIn('packages/desktop/electron-builder.yml', [
            ['appId: sh.paseo.desktop', 'appId: ng.hyperspace.superagent'],
            ['productName: Paseo', 'productName: SuperAgent'],
            ['executableName: Paseo', 'executableName: SuperAgent'],
            ['owner: getpaseo', 'owner: DrOlu'],
            ['repo: paseo', 'repo: SuperAgent'],
            ['artifactName: \"Paseo-', 'artifactName: \"SuperAgent-'],
            ['maintainer: \"Mohamed Boudra <hello@moboudra.com>\"', 'maintainer: \"Hyperspace Technologies <superagent@hyperspace.ng>\"'],
            ['vendor: \"Paseo\"', 'vendor: \"SuperAgent by Hyperspace Technologies\"'],
            ['hardenedRuntime: true', 'hardenedRuntime: false'],
            ['notarize: true', 'notarize: false'],
          ]);

          // Remove entitlements + add identity:null for mac
          const ebPath = 'packages/desktop/electron-builder.yml';
          if (fs.existsSync(ebPath)) {
            let eb = fs.readFileSync(ebPath, 'utf8');
            eb = eb.replace('  notarize: false\n  entitlements: build/entitlements.mac.plist\n  entitlementsInherit: build/entitlements.mac.inherit.plist',
                            '  notarize: false\n  identity: null');
            fs.writeFileSync(ebPath, eb);
          }

          // desktop/package.json
          const dpkg = JSON.parse(fs.readFileSync('packages/desktop/package.json', 'utf8'));
          dpkg.description = 'SuperAgent desktop app (Electron wrapper)';
          dpkg.homepage = 'https://hyperspace.ng';
          dpkg.author = { name: 'Hyperspace Technologies', email: 'superagent@hyperspace.ng' };
          if (dpkg.repository?.url) dpkg.repository.url = 'https://github.com/DrOlu/SuperAgent.git';
          fs.writeFileSync('packages/desktop/package.json', JSON.stringify(dpkg, null, 2) + '\n');

          // root package.json
          const rpkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          rpkg.author = { name: 'Hyperspace Technologies', email: 'superagent@hyperspace.ng' };
          rpkg.homepage = 'https://hyperspace.ng';
          fs.writeFileSync('package.json', JSON.stringify(rpkg, null, 2) + '\n');

          // Website downloads
          replaceIn('packages/website/src/downloads.tsx', [
            ['https://github.com/getpaseo/paseo/releases/download/v\${desktopVersion}',
             'https://github.com/DrOlu/SuperAgent/releases/download/v\${desktopVersion}'],
            ['/Paseo-\${desktopVersion}', '/SuperAgent-\${desktopVersion}'],
            ['/Paseo-Setup-\${desktopVersion}', '/SuperAgent-Setup-\${desktopVersion}'],
          ]);

          // README
          replaceIn('README.md', [
            ['# Paseo', '# SuperAgent'],
            ['Paseo', 'SuperAgent'],
            ['getpaseo/paseo', 'DrOlu/SuperAgent'],
            ['paseo.sh', 'hyperspace.ng'],
          ]);

          console.log('Rebrand applied');
          "

          # Replace icon files from branding/
          for DEST_SRC in \
            "packages/desktop/assets/icon.png:branding/icon.png" \
            "packages/desktop/assets/icon.ico:branding/icon.ico" \
            "packages/desktop/assets/icon.icns:branding/icon.icns" \
            "packages/desktop/assets/128x128@2x.png:branding/icon_256.png" \
            "packages/desktop/assets/128x128.png:branding/icon_128.png" \
            "packages/desktop/assets/64x64.png:branding/icon_64.png" \
            "packages/desktop/assets/32x32.png:branding/icon_32.png" \
            "packages/app/assets/images/icon.png:branding/icon.png" \
            "packages/app/assets/images/favicon.png:branding/icon_256.png" \
            "packages/app/assets/images/splash-icon.png:branding/icon.png" \
            "packages/app/assets/images/notification-icon.png:branding/icon.png" \
            "packages/app/assets/images/android-icon-foreground.png:branding/icon.png"; do
            DEST="${DEST_SRC%%:*}"
            SRC="${DEST_SRC##*:}"
            [ -f "$SRC" ] && cp "$SRC" "$DEST"
          done

          # Replace SVG favicons
          for f in packages/app/assets/images/*.svg; do
            [ -f "branding/icon-s.svg" ] && cp branding/icon-s.svg "$f"
          done
          for f in packages/app/assets/images/favicon*.png; do
            [ -f "branding/icon_256.png" ] && cp branding/icon_256.png "$f"
          done

          # Website icons
          [ -f branding/icon-s.svg ] && cat > packages/website/public/logo.svg << 'SVGEOF'
          <svg width="32" height="32" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M80,0 H432 A80,80,0,0,1,512,80 V432 A80,80,0,0,1,432,512 H80 A80,80,0,0,1,0,432 V80 A80,80,0,0,1,80,0 Z" fill="#CC1100"/>
          <path d="M180.6,373.2 C196.4,376.3 216.1,377.3 233.2,377.3 C281.1,377.3 343.4,367.2 343.4,304.9 C343.4,283.5 334.4,269.1 320.3,258.3 C300.2,242.9 271.8,234.9 250.3,225.5 C235.2,218.8 224.2,211.8 224.2,200.4 C224.2,181.3 247.6,174.3 283.5,174.3 C298.2,174.3 312.6,175.6 327.4,178.6 L327.4,138.8 C312.3,135.7 297.2,134.7 281.8,134.7 C233.9,134.7 168.2,144.8 168.2,207.1 C168.2,228.5 177.3,242.9 191.3,253.7 C211.4,269.1 239.9,277.1 261.4,286.5 C276.4,293.2 287.5,300.2 287.5,311.6 C287.5,330.7 264.0,337.7 228.2,337.7 C213.5,337.7 199.1,336.4 184.3,333.4 L184.3,373.2 Z" fill="#FFFFFF"/>
          </svg>
          SVGEOF
          cp packages/website/public/logo.svg packages/website/public/favicon.svg 2>/dev/null || true
          [ -f branding/icon.ico ] && cp branding/icon.ico packages/website/public/favicon.ico

          # Replace the app logo component with SuperAgent S
          cat > packages/app/src/components/icons/paseo-logo.tsx << 'LOGOEOF'
          import Svg, { Path, Rect } from "react-native-svg";

          interface PaseoLogoProps {
            size?: number;
            color?: string;
          }

          export function PaseoLogo({ size = 64 }: PaseoLogoProps) {
            return (
              <Svg width={size} height={size} viewBox="0 0 512 512" fill="none">
                <Rect width="512" height="512" rx="80" ry="80" fill="#CC1100" />
                <Path
                  d="M180.6,373.2 C196.4,376.3 216.1,377.3 233.2,377.3 C281.1,377.3 343.4,367.2 343.4,304.9 C343.4,283.5 334.4,269.1 320.3,258.3 C300.2,242.9 271.8,234.9 250.3,225.5 C235.2,218.8 224.2,211.8 224.2,200.4 C224.2,181.3 247.6,174.3 283.5,174.3 C298.2,174.3 312.6,175.6 327.4,178.6 L327.4,138.8 C312.3,135.7 297.2,134.7 281.8,134.7 C233.9,134.7 168.2,144.8 168.2,207.1 C168.2,228.5 177.3,242.9 191.3,253.7 C211.4,269.1 239.9,277.1 261.4,286.5 C276.4,293.2 287.5,300.2 287.5,311.6 C287.5,330.7 264.0,337.7 228.2,337.7 C213.5,337.7 199.1,336.4 184.3,333.4 L184.3,373.2 Z"
                  fill="#FFFFFF"
                />
              </Svg>
            );
          }
          LOGOEOF

          echo "All branding applied"

      - name: Set version
        if: steps.check.outputs.has_changes == 'true'
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          node -e "
            const fs = require('fs');
            for (const p of ['package.json', 'packages/desktop/package.json']) {
              const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
              pkg.version = '$VERSION';
              fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
            }
          "
          echo "Version: $VERSION"

      - name: Verify sync is buildable (smoke check)
        if: steps.check.outputs.has_changes == 'true'
        id: verify
        run: |
          set -e
          echo "::group::Install deps (npm ci --legacy-peer-deps)"
          npm ci --legacy-peer-deps
          echo "::endgroup::"

          echo "::group::Check emit-release-env.mjs emits RELEASE_CHANNEL"
          VERSION="${{ steps.version.outputs.version }}"
          ENV_OUT=$(node scripts/emit-release-env.mjs --source-tag "v${VERSION}")
          echo "$ENV_OUT"
          if ! echo "$ENV_OUT" | grep -q '^RELEASE_CHANNEL='; then
            echo "::error::emit-release-env.mjs did not emit RELEASE_CHANNEL — desktop-release.yml will fail with 'unbound variable'."
            exit 1
          fi
          echo "::endgroup::"

          echo "::group::Typecheck @getpaseo/desktop (catches auto-updater TS errors)"
          # Need daemon packages built first for cross-workspace type resolution
          npm run build:daemon
          npm run typecheck --workspace=@getpaseo/desktop
          echo "::endgroup::"

          echo "::group::Build desktop TypeScript (mirrors release build:main)"
          npm run build:main --workspace=@getpaseo/desktop
          echo "::endgroup::"

          echo "Smoke check passed — safe to publish"

      - name: Report verification failure
        if: steps.check.outputs.has_changes == 'true' && failure() && steps.verify.conclusion == 'failure'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "::warning::Sync verification failed for upstream ${{ env.UPSTREAM_SHA }}. main and tags were NOT updated."
          # Best-effort: open/update a tracking issue so the failure isn't silent
          TITLE="Sync failed for upstream ${{ env.UPSTREAM_SHA }}"
          BODY=$'Automated sync verification failed.\n\nUpstream SHA: `${{ env.UPSTREAM_SHA }}`\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\nSuperAgent `main` and the `v*` tag were NOT updated. Investigate the failing step above.'
          # Only create if no open issue with same title exists
          EXISTING=$(gh issue list --repo "${{ github.repository }}" --state open --search "$TITLE in:title" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$EXISTING" ]; then
            gh issue create --repo "${{ github.repository }}" --title "$TITLE" --body "$BODY" --label "sync-failure" 2>/dev/null || gh issue create --repo "${{ github.repository }}" --title "$TITLE" --body "$BODY" || true
          else
            echo "Existing issue #$EXISTING already tracks this kind of failure."
          fi

      - name: Commit and push
        if: steps.check.outputs.has_changes == 'true' && steps.verify.conclusion == 'success'
        env:
          # Defuse upstream's lefthook pre-commit hook (installed automatically by `npm ci`
          # via the "prepare": "lefthook install --force" script). Our sync verify step
          # already runs typecheck + build, so upstream's format/lint check on our
          # rebrand patches is redundant AND fails (our patches intentionally don't
          # match upstream's formatting).
          LEFTHOOK: 0
        run: |
          # Belt-and-suspenders: wipe any installed git hooks before committing,
          # then commit with --no-verify to bypass pre-commit entirely.
          rm -rf .git/hooks
          mkdir -p .git/hooks
          git add -A
          git commit --no-verify -m "sync: SuperAgent rebrand on upstream ${{ env.UPSTREAM_SHA }}

          upstream-sync: ${{ env.UPSTREAM_SHA }}"
          git push origin sync-work:main --force
          echo "Pushed to main"

      - name: Create tag and release
        if: steps.check.outputs.has_changes == 'true' && steps.verify.conclusion == 'success'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"
          # Clean up any existing tag/release for this version
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true
          sleep 2

          # Create and push tag (triggers desktop-release.yml automatically)
          git tag -f "$TAG"
          git push origin "$TAG" --force

          # Create release
          gh release create "$TAG" \
            --title "SuperAgent $TAG" \
            --notes "## SuperAgent $TAG - Synced with upstream paseo@$(echo ${{ env.UPSTREAM_SHA }} | cut -c1-8)" \
            --target main 2>/dev/null || echo "Release may already exist"
          echo "Done — builds will trigger automatically"
